version: "3.9"

services:

  easyshop:

    build: .

    container_name: easyshop

    ports:

      - "3000:3000"

    environment:

      NODE_ENV: development

      MONGODB_URI: mongodb://mongodb:27017/easyshop

    depends_on:

      - mongodb

  mongodb:

    image: mongo:7

    container_name: mongodb

    ports:

      - "27017:27017"

    volumes:

      - mongo-data:/data/db

volumes:

  mongo-data:
