apiVersion: apps/v1

kind: Deployment

metadata:

  name: easyshop

  namespace: easyshop

spec:

  replicas: 2

  selector:

    matchLabels:

      app: easyshop

  template:

    metadata:

      labels:

        app: easyshop

    spec:

      containers:

      - name: easyshop

        image: yourdockerhub/easyshop:latest

        imagePullPolicy: Always

        ports:

        - containerPort: 3000

        envFrom:

        - configMapRef:

            name: easyshop-config

        - secretRef:

            name: easyshop-secrets

        resources:

          requests:

            cpu: 250m

            memory: 256Mi

          limits:

            cpu: 500m

            memory: 512Mi

        readinessProbe:

          httpGet:

            path: /

            port: 3000

        livenessProbe:

          httpGet:

            path: /

            port: 3000
